spring:
  datasource:
    url: jdbc:h2:mem:tasktrackerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  security:
    user:
      name: admin
      password: admin123

  mail:
    host: smtp.gmail.com
    port: 465
    username: @gmail.com        # ← your Gmail
    password: ""    # ← 16-char App Password in quotes
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        starttls:
          enable: false

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  sql:
    init:
      mode: always

server:
  port: 8080