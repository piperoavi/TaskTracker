spring:
  datasource:
    url: jdbc:h2:mem:tasktrackerdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  security:
    user:
      name: admin
      password: admin123

  mail:
      host: smtp.gmail.com
      port: 587
      username: your_email@gmail.com
      password: your_app_password
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080
